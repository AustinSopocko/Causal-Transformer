dataset:
  country_col: CountryName
  date_col: Date
  policy_cols:
    - StringencyIndex_Average
    - C1M_School closing
    - C2M_Workplace closing
    - C3M_Cancel public events
    - C4M_Restrictions on gatherings
    - C6M_Stay at home requirements
    - H6M_Facial Coverings
  outcome_cols:
    - new_cases_smoothed_per_million
    - new_deaths_smoothed_per_million
  state_cols: []
  context_cols: []

window:
  history_len: 21
  forecast_horizon: 42
  stride: 7

split:
  strategy: time
  train_fraction: 0.8
  holdout_fraction: 0.2
  seed: 42

model:
  d_model: 128
  n_heads: 4
  n_layers_enc: 3
  n_layers_dec: 3
  dropout: 0.1
  target_mode: residual_persistence

training:
  batch_size: 64
  epochs: 40
  lr: 0.0001
  teacher_forcing_start: 1.0
  teacher_forcing_end: 0.1
  teacher_forcing_schedule: cosine
  rollout_loss_weight: 0.25
  rollout_loss_start_epoch: 5
  policy_change_weight_power: 1.25
  policy_change_weight_max: 3.0
  grad_clip_norm: 1.0
  early_stopping_patience: 10
  checkpoint_metric: late_rmse
  checkpoint_long_start: 22
  checkpoint_late_start: 32

loss:
  type: mse
  increment_loss_weight: 0.2
  horizon_weighting: power
  horizon_weight_start: 0.8
  horizon_weight_end: 2.6
  horizon_weight_power: 2.0
  huber_delta: 1.0
  anchor_weight: 0.02
  nonneg_weight: 0.01

normalization:
  log1p_outcomes: false
